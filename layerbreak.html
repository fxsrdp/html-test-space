<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer Break — Gentle Monster SG</title>
<style>
:root{
  --c:#00e5ff;--c08:rgba(0,229,255,.08);--c12:rgba(0,229,255,.12);
  --c18:rgba(0,229,255,.18);--c25:rgba(0,229,255,.25);
  --bg1:#f7f6f4;--bg2:#ece8df;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg1)}
body{
  font-family:system-ui,-apple-system,sans-serif;color:#2c2c2c;
  background:var(--bg1);line-height:1.6;font-size:clamp(.875rem,1.1vw,1.05rem);
  -webkit-font-smoothing:antialiased;padding:2rem 1.5rem 0;
}
.nav{
  max-width:900px;margin:0 auto 2rem;display:flex;align-items:center;gap:1.2rem;
  font-size:12px;letter-spacing:.06em;border-bottom:1px solid #e0ddd6;padding-bottom:.75rem;
}
.nav b{font-weight:500;color:#1a1a1a;flex:1}
.nav a{color:#999;text-decoration:none;transition:color .2s}
.nav a:hover,.nav a.active{color:var(--c)}
.inner{max-width:900px;margin:0 auto}
.sec-title{font-size:clamp(1.2rem,2vw,1.6rem);font-weight:300;letter-spacing:.03em;color:#1a1a1a;margin-bottom:.25rem}
.sec-label{font-size:12px;letter-spacing:.1em;color:var(--c);text-transform:uppercase;margin-bottom:.3rem}
.sec-desc{color:#888;margin-bottom:1.5rem;max-width:560px;font-size:.9rem}

.canvas-wrap{
  max-width:800px;margin:0 auto 1.5rem;
  border:1px solid #e0ddd6;border-radius:4px;overflow:hidden;background:#111;
}
.canvas{position:relative;width:100%;aspect-ratio:1/1}
.canvas img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.canvas .ly{opacity:0;pointer-events:none;transition:opacity .3s}
.canvas .ly.on{opacity:1}
.canvas .ly.ana-depth.on{mix-blend-mode:screen}
.canvas .ly.ana-norm.on{mix-blend-mode:overlay}
.canvas .ly.ana-objs.on{mix-blend-mode:screen}

.ctrl-section{margin-bottom:.8rem}
.ctrl-label{font-size:10px;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.35rem}
.ctrl-row{display:flex;gap:.35rem;flex-wrap:wrap}

.ctrl-btn{
  display:inline-flex;align-items:center;gap:.25rem;
  padding:.4rem .65rem;border:1px solid #e0ddd6;border-radius:3px;
  font-size:10px;letter-spacing:.04em;color:#888;
  background:none;cursor:pointer;transition:all .2s;font-family:inherit;
}
.ctrl-btn:hover{border-color:var(--c25);color:#555}
.ctrl-btn.on{border-color:var(--c);color:var(--c);background:var(--c08)}
.ctrl-btn .dot{width:5px;height:5px;border-radius:50%;background:#ccc;flex-shrink:0}
.ctrl-btn.on .dot{background:var(--c)}</style>
</head>
<body>

<nav class="nav">
  <b>HTML TEST SPACE</b>
  <a href="index.html">Index</a>
  <a href="pipeline.html">Pipeline</a>
  <a href="layerbreak.html" class="active">Layer Break</a>
</nav>

<div class="inner">

<section style="margin-bottom:1.5rem">
  <div class="sec-label">Gentle Monster SG</div>
  <div class="sec-title">Layer Break</div>
  <div class="sec-desc">
    sg.001 alpha mask sliced every SDXL output into two layers — product-only and environment-only. All layers carry their own alpha channel. No CSS masks. Stack and toggle.
  </div>
</section>

<div class="canvas-wrap">
  <div class="canvas" id="canvas">

    <!-- z1: Environment (alpha = everything except product) -->
    <img class="ly on" id="env-jungle"   src="img/pipeline/sliced/env_jungle.png">
    <img class="ly"    id="env-space"    src="img/pipeline/sliced/env_space.png">
    <img class="ly"    id="env-fashion"  src="img/pipeline/sliced/env_fashion.png">
    <img class="ly"    id="env-scifi"    src="img/pipeline/sliced/env_scifi.png">
    <img class="ly"    id="env-bubble"   src="img/pipeline/sliced/env_bubble.png">
    <img class="ly"    id="env-jv1"      src="img/pipeline/sliced/env_junglev1.png">

    <!-- z2: Product (alpha = only product region) -->
    <img class="ly on" id="sg-beauty"  src="img/pipeline/sliced/product_beauty.png">
    <img class="ly"    id="sg-jungle"  src="img/pipeline/sliced/product_jungle.png">
    <img class="ly"    id="sg-space"   src="img/pipeline/sliced/product_space.png">
    <img class="ly"    id="sg-fashion" src="img/pipeline/sliced/product_fashion.png">
    <img class="ly"    id="sg-scifi"   src="img/pipeline/sliced/product_scifi.png">
    <img class="ly"    id="sg-bubble"  src="img/pipeline/sliced/product_bubble.png">

    <!-- z3: Analysis (blend modes only, no alpha slicing) -->
    <img class="ly ana-depth" id="ly-depth"   src="img/pipeline/gentle_monster_depth.png">
    <img class="ly ana-norm"  id="ly-normals" src="img/pipeline/gentle_monster_normal.png">
    <img class="ly ana-objs"  id="ly-objects" src="img/pipeline/gentle_monster_objects.png">

  </div>
</div>

<div class="ctrl-section">
  <div class="ctrl-label">Environment</div>
  <div class="ctrl-row" id="env-grp">
    <button class="ctrl-btn on" data-id="env-jungle"><span class="dot"></span>Jungle</button>
    <button class="ctrl-btn"    data-id="env-space"><span class="dot"></span>Space</button>
    <button class="ctrl-btn"    data-id="env-fashion"><span class="dot"></span>Fashion</button>
    <button class="ctrl-btn"    data-id="env-scifi"><span class="dot"></span>Sci-Fi</button>
    <button class="ctrl-btn"    data-id="env-bubble"><span class="dot"></span>Bubble</button>
    <button class="ctrl-btn"    data-id="env-jv1"><span class="dot"></span>Jungle v1</button>
  </div>
</div>

<div class="ctrl-section">
  <div class="ctrl-label">Product</div>
  <div class="ctrl-row" id="sg-grp">
    <button class="ctrl-btn on" data-id="sg-beauty"><span class="dot"></span>Beauty</button>
    <button class="ctrl-btn"    data-id="sg-jungle"><span class="dot"></span>Jungle</button>
    <button class="ctrl-btn"    data-id="sg-space"><span class="dot"></span>Space</button>
    <button class="ctrl-btn"    data-id="sg-fashion"><span class="dot"></span>Fashion</button>
    <button class="ctrl-btn"    data-id="sg-scifi"><span class="dot"></span>Sci-Fi</button>
    <button class="ctrl-btn"    data-id="sg-bubble"><span class="dot"></span>Bubble</button>
  </div>
</div>

<div class="ctrl-section">
  <div class="ctrl-label">Analysis</div>
  <div class="ctrl-row" id="ana-grp">
    <button class="ctrl-btn" data-id="ly-depth"><span class="dot"></span>Depth</button>
    <button class="ctrl-btn" data-id="ly-normals"><span class="dot"></span>Normals</button>
    <button class="ctrl-btn" data-id="ly-objects"><span class="dot"></span>Object IDs</button>
  </div>
</div>

</div>

<script>
function radio(sel){
  document.querySelectorAll(sel+' .ctrl-btn').forEach(b=>{
    b.classList.remove('on');
    const el=document.getElementById(b.dataset.id);
    if(el)el.classList.remove('on');
  });
}

document.querySelectorAll('#env-grp .ctrl-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    radio('#env-grp');this.classList.add('on');
    document.getElementById(this.dataset.id).classList.add('on');
  });
});
document.querySelectorAll('#sg-grp .ctrl-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    radio('#sg-grp');this.classList.add('on');
    document.getElementById(this.dataset.id).classList.add('on');
  });
});
document.querySelectorAll('#ana-grp .ctrl-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    this.classList.toggle('on');
    document.getElementById(this.dataset.id).classList.toggle('on');
  });
});
</script>
</body>
</html>
